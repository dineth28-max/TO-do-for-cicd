name: CD pipleine
on:
  workflow_run:
    workflows: ["CI part to push the dockerhub"]
    types:
      - completed

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
  
    runs-on: self-hosted
    steps:
      - name: Set image tag
        shell: bash
        run: echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"

      - name: remove old container
        run: docker rm -f new1 || true

      - name: remove the port 5000
        shell: bash
        run: |
          mapfile -t port_containers < <(docker ps -q --filter publish=5000)
          if [ ${#port_containers[@]} -gt 0 ]; then
            docker rm -f "${port_containers[@]}" || true
          else
            echo "No running containers found on port 5000."
          fi
          
      - name: pull the docker image
        run: docker pull dineth123412/news1:${IMAGE_TAG}

      - name: keep only 5 newest docker images
        shell: bash
        run: |
          mapfile -t image_ids < <(
            docker image ls -q --filter=reference='dineth123412/news1:*' \
            | awk '!seen[$0]++'
          )

          if [ ${#image_ids[@]} -le 5 ]; then
            echo "No old images to delete."
            exit 0
          fi

          mapfile -t sorted_ids < <(
            for image_id in "${image_ids[@]}"; do
              created_at=$(docker image inspect --format '{{.Created}}' "$image_id")
              printf '%s %s\n' "$created_at" "$image_id"
            done | sort -r | awk '{print $2}'
          )

          old_images=("${sorted_ids[@]:5}")

          if [ ${#old_images[@]} -gt 0 ]; then
            docker image rm "${old_images[@]}" || true
          else
            echo "No old images to delete."
          fi

      - name: run the docker container
        run: docker run -d --name new1 -p 5000:5000 dineth123412/news1:${IMAGE_TAG}

      
      