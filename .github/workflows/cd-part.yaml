name: CD pipleine
on:
  workflow_run:
    workflows: ["CI part to push the dockerhub"]
    types:
      - completed

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
  
    runs-on: self-hosted
    steps:
      - name: remove old container
        run: docker rm -f new1 || true

      - name: remove the port 5000
        shell: bash
        run: |
          mapfile -t port_containers < <(docker ps -q --filter publish=5000)
          if [ ${#port_containers[@]} -gt 0 ]; then
            docker rm -f "${port_containers[@]}" || true
          else
            echo "No running containers found on port 5000."
          fi
          
      - name: pull the docker image
        run: docker pull dineth123412/news1:latest

      - name: keep only 5 newest docker images (Cleanup logic)
        shell: bash
        run: |
          mapfile -t image_rows < <(
            docker image ls dineth123412/news1 --format '{{.Repository}}:{{.Tag}} {{.CreatedAt}}' \
            | grep -v ':latest ' \
            | sort -k2,3 -r
          )

          if [ ${#image_rows[@]} -le 5 ]; then
            echo "No old images to delete."
            exit 0
          fi

          mapfile -t old_images < <(
            printf '%s\n' "${image_rows[@]:5}" | awk '{print $1}'
          )

          if [ ${#old_images[@]} -gt 0 ]; then
            docker image rm "${old_images[@]}" || true
          else
            echo "No old images to delete."
          fi

      - name: run the docker container
        run: docker run -d --name new1 -p 5000:5000 dineth123412/news1:latest

      
      