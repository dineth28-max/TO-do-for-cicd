---
- name: Install Docker on EC2
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait for 
      wait_for_connection:
        delay: 10
        timeout: 300

    - name: Gather facts 
      ansible.builtin.setup:

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Install Docker engine 
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Ensure docker enables 
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true
